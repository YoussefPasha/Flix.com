# Development Docker Compose - Full Stack
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flix_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-flix_db}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flix-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: flix_backend_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-flix_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: yarn start:dev
    networks:
      - flix-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: flix_frontend_dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      API_URL: ${API_URL:-http://backend:3000/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    ports:
      - '${FRONTEND_PORT:-3001}:3000'
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    command: yarn dev
    networks:
      - flix-network

volumes:
  postgres_data:

networks:
  flix-network:
    driver: bridge

